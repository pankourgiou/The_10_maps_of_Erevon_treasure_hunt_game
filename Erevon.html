<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erevon — Ten Treasure Hunts</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dim: #7a5f22;
    --ink: #0d0a06;
    --parchment: #f5e9cc;
    --parchment-dark: #e2d09a;
    --teal: #3a8a7a;
    --ember: #b05020;
    --ice: #7ac0d8;
    --hot: #e05020;
    --warm: #e09020;
    --cool: #4090c0;
    --cold: #204880;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    font-family: 'EB Garamond', serif;
    color: var(--parchment);
    min-height: 100vh;
  }

  /* ── LOBBY ── */
  #lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
    background: radial-gradient(ellipse at center, #1a1208 0%, #0d0a06 70%);
  }

  #lobby h1 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(1.6rem, 4vw, 3rem);
    color: var(--gold);
    text-align: center;
    letter-spacing: 0.08em;
    text-shadow: 0 0 30px rgba(201,168,76,0.4);
    margin-bottom: 0.3em;
  }

  #lobby .subtitle {
    font-family: 'Cinzel', serif;
    color: var(--gold-dim);
    letter-spacing: 0.2em;
    font-size: 0.85rem;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  .map-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
    max-width: 1100px;
    width: 100%;
  }

  .map-card {
    background: linear-gradient(145deg, #1e1608, #140f05);
    border: 1px solid var(--gold-dim);
    border-radius: 4px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .map-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .map-card:hover {
    border-color: var(--gold);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(201,168,76,0.15);
  }

  .map-card .card-num {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 0.7rem;
    color: var(--gold-dim);
    letter-spacing: 0.2em;
    margin-bottom: 6px;
  }

  .map-card h2 {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--gold-light);
    margin-bottom: 8px;
  }

  .map-card p {
    font-size: 0.82rem;
    color: #a09070;
    line-height: 1.5;
  }

  .map-card .difficulty {
    display: inline-block;
    margin-top: 12px;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    padding: 3px 10px;
    border-radius: 2px;
  }

  .diff-easy   { background: rgba(58,138,122,0.2); color: var(--teal); border: 1px solid var(--teal); }
  .diff-medium { background: rgba(176,80,32,0.2);  color: #d07040;     border: 1px solid #804020; }
  .diff-hard   { background: rgba(200,40,40,0.2);  color: #e06060;     border: 1px solid #802020; }

  /* ── GAME SCREEN ── */
  #game { display: none; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }

  .game-header {
    width: 100%;
    max-width: 860px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
  }

  .back-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--gold-dim);
    background: transparent;
    border: 1px solid var(--gold-dim);
    padding: 6px 14px;
    cursor: pointer;
    letter-spacing: 0.1em;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .back-btn:hover { color: var(--gold); border-color: var(--gold); }

  .game-title {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(0.9rem, 2.5vw, 1.3rem);
    color: var(--gold);
    flex: 1;
    text-align: center;
  }

  .score-box {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    color: var(--gold-dim);
    white-space: nowrap;
  }

  /* MAP CONTAINER */
  .map-wrap {
    position: relative;
    width: 100%;
    max-width: 760px;
    border: 2px solid var(--gold-dim);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.7), inset 0 0 60px rgba(0,0,0,0.3);
    cursor: crosshair;
    touch-action: none;
  }

  .map-wrap img {
    display: block;
    width: 100%;
    height: auto;
    user-select: none;
    pointer-events: none;
  }

  /* RADAR OVERLAY */
  #radar-ring {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: left 0.15s, top 0.15s;
    display: none;
  }

  /* TREASURE MARKER (revealed) */
  .treasure-marker {
    position: absolute;
    width: 26px;
    height: 26px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: treasureAppear 0.6s ease forwards;
  }

  @keyframes treasureAppear {
    0%   { transform: translate(-50%,-50%) scale(0) rotate(-90deg); opacity:0; }
    70%  { transform: translate(-50%,-50%) scale(1.3) rotate(10deg); }
    100% { transform: translate(-50%,-50%) scale(1) rotate(0deg); opacity:1; }
  }

  /* CLICK RIPPLE */
  .click-ripple {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    transform: translate(-50%,-50%) scale(0);
    pointer-events: none;
    animation: ripple 0.7s ease-out forwards;
  }

  @keyframes ripple {
    to { transform: translate(-50%,-50%) scale(6); opacity: 0; }
  }

  /* RADAR PANEL */
  .radar-panel {
    margin-top: 16px;
    width: 100%;
    max-width: 760px;
    display: flex;
    gap: 16px;
    align-items: stretch;
  }

  .radar-visual {
    flex: 0 0 140px;
    height: 140px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .radar-bg {
    position: absolute;
    inset: 0;
  }

  .radar-needle {
    position: absolute;
    width: 2px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, #00ff88);
    bottom: 50%;
    left: 50%;
    transform-origin: bottom center;
    transform: translateX(-50%) rotate(0deg);
    transition: transform 0.4s ease;
    filter: drop-shadow(0 0 4px #00ff88);
  }

  .radar-dot {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #00ff88;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    box-shadow: 0 0 8px #00ff88;
  }

  .radar-info {
    flex: 1;
    background: rgba(0,0,0,0.4);
    border: 1px solid #2a2010;
    border-radius: 4px;
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
  }

  .temp-label {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    font-weight: 700;
    transition: color 0.4s;
    letter-spacing: 0.05em;
  }

  .temp-bar-wrap {
    height: 8px;
    background: #0a0806;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid #2a2010;
  }

  .temp-bar {
    height: 100%;
    width: 0%;
    border-radius: 4px;
    transition: width 0.4s, background 0.4s;
  }

  .distance-text {
    font-size: 0.8rem;
    color: #806040;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.08em;
  }

  .attempts-row {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    color: var(--gold-dim);
    letter-spacing: 0.1em;
  }

  /* CLUE BOX */
  .clue-box {
    margin-top: 12px;
    width: 100%;
    max-width: 760px;
    background: linear-gradient(135deg, #150f05, #0d0a03);
    border: 1px solid #3a2a10;
    border-radius: 4px;
    padding: 14px 20px;
  }

  .clue-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    color: var(--gold-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .clue-text {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: #c0a870;
    line-height: 1.6;
  }

  /* WIN OVERLAY */
  #win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    text-align: center;
    padding: 30px;
  }

  #win-overlay.show { display: flex; animation: fadeIn 0.5s ease; }

  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  #win-overlay h2 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(1.4rem, 4vw, 2.5rem);
    color: var(--gold);
    text-shadow: 0 0 40px rgba(201,168,76,0.6);
    animation: glow 2s ease-in-out infinite alternate;
  }

  @keyframes glow {
    from { text-shadow: 0 0 20px rgba(201,168,76,0.4); }
    to   { text-shadow: 0 0 60px rgba(201,168,76,0.9), 0 0 100px rgba(201,168,76,0.3); }
  }

  #win-overlay p {
    font-family: 'EB Garamond', serif;
    font-size: 1.1rem;
    color: #c0a870;
    max-width: 400px;
    line-height: 1.7;
  }

  .win-score {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    color: var(--gold-light);
    letter-spacing: 0.1em;
  }

  .win-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    color: var(--ink);
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    border: none;
    padding: 12px 32px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .win-btn:hover { transform: scale(1.04); box-shadow: 0 4px 20px rgba(201,168,76,0.4); }

  /* Decorative separator */
  .sep {
    width: 200px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
    margin: 10px auto;
  }

  /* Progress dots */
  .progress-dots {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .pdot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #2a2010;
    border: 1px solid #3a3010;
    transition: all 0.3s;
  }
  .pdot.used { background: #804020; border-color: #c06030; }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <h1>⚔ Erevon ⚔</h1>
  <div class="subtitle">The Ten Maps of Erevon</div>
  <div class="sep"></div>
  <br>
  <div class="map-grid" id="map-grid"></div>
</div>

<!-- GAME -->
<div id="game">
  <div class="game-header">
    <button class="back-btn" onclick="showLobby()">◄ Maps</button>
    <div class="game-title" id="g-title"></div>
    <div class="score-box" id="g-score">Score: 0</div>
  </div>

  <div class="map-wrap" id="map-wrap">
    <img id="map-img" src="" alt="Map">
    <div id="radar-ring"></div>
  </div>

  <div class="radar-panel">
    <div class="radar-visual">
      <svg class="radar-bg" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
        <circle cx="70" cy="70" r="65" fill="none" stroke="#1a3020" stroke-width="1"/>
        <circle cx="70" cy="70" r="48" fill="none" stroke="#1a3020" stroke-width="1"/>
        <circle cx="70" cy="70" r="30" fill="none" stroke="#1a3020" stroke-width="1"/>
        <circle cx="70" cy="70" r="12" fill="none" stroke="#1a3020" stroke-width="1"/>
        <line x1="70" y1="5" x2="70" y2="135" stroke="#1a3020" stroke-width="1"/>
        <line x1="5" y1="70" x2="135" y2="70" stroke="#1a3020" stroke-width="1"/>
        <circle cx="70" cy="70" r="65" fill="none" stroke="#0a1a10" stroke-width="0"/>
        <radialGradient id="rg" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#003010" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#000a05" stop-opacity="0.95"/>
        </radialGradient>
        <circle cx="70" cy="70" r="65" fill="url(#rg)"/>
        <!-- sweep -->
        <path id="radar-sweep" d="M70,70 L70,5 A65,65 0 0,1 125,100 Z" fill="rgba(0,255,100,0.06)" opacity="0">
          <animateTransform attributeName="transform" type="rotate" from="0 70 70" to="360 70 70" dur="3s" repeatCount="indefinite"/>
        </path>
      </svg>
      <div class="radar-needle" id="r-needle"></div>
      <div class="radar-dot"></div>
    </div>
    <div class="radar-info">
      <div class="temp-label" id="temp-label">— SEEK —</div>
      <div class="temp-bar-wrap"><div class="temp-bar" id="temp-bar"></div></div>
      <div class="distance-text" id="dist-text">Click the map to begin your search</div>
      <div class="attempts-row" id="att-row">Attempts remaining: <span id="att-count">—</span></div>
      <div class="progress-dots" id="prog-dots"></div>
    </div>
  </div>

  <div class="clue-box">
    <div class="clue-label">✦ Cartomancer's Clue ✦</div>
    <div class="clue-text" id="clue-text"></div>
  </div>
</div>

<!-- WIN OVERLAY -->
<div id="win-overlay">
  <h2 id="win-title">✦ Treasure Found! ✦</h2>
  <div class="sep"></div>
  <p id="win-desc"></p>
  <div class="win-score" id="win-score-text"></div>
  <button class="win-btn" onclick="nextHunt()">Seek Another ►</button>
  <button class="win-btn" style="background: linear-gradient(135deg,#2a2010,#1a1408); color:var(--gold); border:1px solid var(--gold-dim);" onclick="showLobby()">Return to Maps</button>
</div>

// Scores
const scores = new Array(10).fill(null);

let currentHunt = null;
let attemptsLeft = 0;
let found = false;
let lastClickPct = null;

// ─── BUILD LOBBY ───
function buildLobby() {
  const grid = document.getElementById('map-grid');
  grid.innerHTML = '';
  HUNTS.forEach((h, i) => {
    const sc = scores[i];
    const diffClass = {Easy:'diff-easy', Medium:'diff-medium', Hard:'diff-hard'}[h.difficulty];
    const card = document.createElement('div');
    card.className = 'map-card';
    card.innerHTML = `
      <div class="card-num">Hunt · ${String(i+1).padStart(2,'0')}</div>
      <h2>${h.title}</h2>
      <p>${h.desc}</p>
      <span class="difficulty ${diffClass}">${h.difficulty}</span>
      ${sc !== null ? `<span style="float:right;font-family:'Cinzel',serif;font-size:0.7rem;color:var(--gold-dim);margin-top:14px;">Score: ${sc}</span>` : ''}
    `;
    card.addEventListener('click', () => startHunt(i));
    grid.appendChild(card);
  });
}

function showLobby() {
  document.getElementById('lobby').style.display = 'flex';
  document.getElementById('game').style.display = 'none';
  document.getElementById('win-overlay').classList.remove('show');
  buildLobby();
}

// ─── START HUNT ───
function startHunt(idx) {
  currentHunt = HUNTS[idx];
  attemptsLeft = currentHunt.maxAttempts;
  found = false;
  lastClickPct = null;

  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  document.getElementById('win-overlay').classList.remove('show');

  document.getElementById('g-title').textContent = currentHunt.title;
  document.getElementById('g-score').textContent = `Score: ${scores[idx] ?? '—'}`;
  document.getElementById('clue-text').textContent = currentHunt.clue;
  document.getElementById('att-count').textContent = attemptsLeft;
  document.getElementById('temp-label').textContent = '— SEEK —';
  document.getElementById('temp-label').style.color = '#806040';
  document.getElementById('temp-bar').style.width = '0%';
  document.getElementById('dist-text').textContent = 'Click the map to begin your search';
  document.getElementById('radar-ring').style.display = 'none';

  // Progress dots
  const pd = document.getElementById('prog-dots');
  pd.innerHTML = '';
  for(let i = 0; i < currentHunt.maxAttempts; i++) {
    const d = document.createElement('div');
    d.className = 'pdot';
    d.id = `pdot-${i}`;
    pd.appendChild(d);
  }

  // Load image
  const img = document.getElementById('map-img');
  img.src = IMG_PATHS[currentHunt.imgKey];

  // Clear old markers
  const wrap = document.getElementById('map-wrap');
  wrap.querySelectorAll('.treasure-marker,.click-ripple').forEach(e => e.remove());

  // radar sweep animation
  document.querySelector('#radar-sweep').style.display = 'block';
  document.querySelector('#radar-sweep animateTransform').beginElement?.();
}

// ─── CLICK HANDLER ───
document.getElementById('map-wrap').addEventListener('click', function(e) {
  if (found) return;
  if (attemptsLeft <= 0) return;

  const rect = this.getBoundingClientRect();
  const px = ((e.clientX - rect.left) / rect.width) * 100;
  const py = ((e.clientY - rect.top) / rect.height) * 100;
  lastClickPct = {x: px, y: py};

  // Ripple
  const ripple = document.createElement('div');
  ripple.className = 'click-ripple';
  ripple.style.left = px + '%';
  ripple.style.top  = py + '%';
  this.appendChild(ripple);
  setTimeout(() => ripple.remove(), 800);

  // Distance %
  const dx = px - currentHunt.tx;
  const dy = py - currentHunt.ty;
  const dist = Math.sqrt(dx*dx + dy*dy); // 0..~100

  attemptsLeft--;
  const dotIdx = currentHunt.maxAttempts - 1 - attemptsLeft;
  const dot = document.getElementById(`pdot-${dotIdx}`);
  if(dot) dot.classList.add('used');
  document.getElementById('att-count').textContent = attemptsLeft;

  if (dist < 4) {
    // FOUND
    found = true;
    revealTreasure(px, py);
    return;
  }

  updateRadar(dist, dx, dy, px, py);

  if (attemptsLeft <= 0) {
    setTimeout(() => {
      revealTreasure(currentHunt.tx, currentHunt.ty, true);
    }, 600);
  }
});

function updateRadar(dist, dx, dy, px, py) {
  // temp category
  let label, color, barColor, barPct;
  if (dist < 8)       { label = '🔥 SCORCHING';  color = '#ff2200'; barColor='#ff3300'; barPct=95; }
  else if (dist < 14) { label = '🔴 BURNING';    color = '#e04010'; barColor='#e05010'; barPct=82; }
  else if (dist < 20) { label = '🟠 HOT';        color = '#d07020'; barColor='#d08020'; barPct=68; }
  else if (dist < 28) { label = '🟡 WARM';       color = '#c0a030'; barColor='#c0b030'; barPct=52; }
  else if (dist < 38) { label = '🔵 COOL';       color = '#4090c0'; barColor='#3080b0'; barPct=36; }
  else if (dist < 52) { label = '❄ COLD';        color = '#2060a0'; barColor='#205090'; barPct=22; }
  else                { label = '🌨 FREEZING';   color = '#104070'; barColor='#103060'; barPct=8;  }

  document.getElementById('temp-label').textContent = label;
  document.getElementById('temp-label').style.color = color;

  const bar = document.getElementById('temp-bar');
  bar.style.width = barPct + '%';
  bar.style.background = `linear-gradient(to right, ${barColor}88, ${barColor})`;

  const distDesc = dist < 8 ? 'You are nearly upon it!' :
    dist < 14 ? 'Very close — just a few steps away.' :
    dist < 20 ? 'The heat grows — you are close.' :
    dist < 28 ? 'Warmth in the air — getting there.' :
    dist < 38 ? 'A chill breeze — still some distance.' :
    dist < 52 ? 'Cold ground — far yet to go.' :
    'Ice in your bones — very far indeed.';
  document.getElementById('dist-text').textContent = distDesc;

  // Needle angle toward treasure
  const angle = Math.atan2(currentHunt.ty - py, currentHunt.tx - px) * 180 / Math.PI + 90;
  document.getElementById('r-needle').style.transform = `translateX(-50%) rotate(${angle}deg)`;

  // Radar ring on map
  const ring = document.getElementById('radar-ring');
  const ringSize = Math.max(20, Math.min(180, dist * 3));
  ring.style.display = 'block';
  ring.style.left = px + '%';
  ring.style.top  = py + '%';
  ring.style.width  = ringSize + 'px';
  ring.style.height = ringSize + 'px';
  ring.style.border = `2px solid ${color}`;
  ring.style.boxShadow = `0 0 12px ${color}88, inset 0 0 8px ${color}44`;
  ring.style.animation = 'none';
  void ring.offsetWidth;
  ring.style.animation = 'radarPulse 0.8s ease-out forwards';
}

// Inject radar animation
const style = document.createElement('style');
style.textContent = `@keyframes radarPulse {
  0%   { opacity:0; transform: translate(-50%,-50%) scale(0.5); }
  40%  { opacity:1; }
  100% { opacity:0.6; transform: translate(-50%,-50%) scale(1); }
}`;
document.head.appendChild(style);

function revealTreasure(px, py, failed = false) {
  const wrap = document.getElementById('map-wrap');

  // Place treasure icon
  const marker = document.createElement('div');
  marker.className = 'treasure-marker';
  marker.style.left = currentHunt.tx + '%';
  marker.style.top  = currentHunt.ty + '%';
  marker.innerHTML = `<svg viewBox="0 0 26 26" xmlns="http://www.w3.org/2000/svg">
    <path d="M13 2 L15.5 9.5 H23 L17 14 L19.5 22 L13 18 L6.5 22 L9 14 L3 9.5 H10.5 Z"
          fill="${failed ? '#804020' : '#f0c030'}" stroke="${failed ? '#602010' : '#c09010'}" stroke-width="1.2"/>
  </svg>`;
  wrap.appendChild(marker);

  document.getElementById('radar-ring').style.display = 'none';

  if (!failed) {
    const attUsed = currentHunt.maxAttempts - attemptsLeft;
    const sc = Math.max(0, Math.round(1000 - attUsed * 70));
    scores[currentHunt.id] = sc;
    document.getElementById('g-score').textContent = `Score: ${sc}`;

    setTimeout(() => {
      document.getElementById('win-title').textContent = '✦ Treasure Found! ✦';
      document.getElementById('win-desc').textContent = currentHunt.reward;
      document.getElementById('win-score-text').textContent = `Score: ${sc} — ${attUsed} attempt${attUsed !== 1 ? 's' : ''}`;
      document.getElementById('win-overlay').classList.add('show');
    }, 700);
  } else {
    document.getElementById('temp-label').textContent = '✗ LOST';
    document.getElementById('temp-label').style.color = '#804020';
    document.getElementById('dist-text').textContent = 'The treasure eludes you. The star marks its true resting place.';
    scores[currentHunt.id] = 0;
    setTimeout(() => {
      document.getElementById('win-title').textContent = '☽ The Hunt Is Lost ☽';
      document.getElementById('win-desc').textContent = 'The treasure remains hidden from mortal eyes... for now.';
      document.getElementById('win-score-text').textContent = 'Score: 0';
      document.getElementById('win-overlay').classList.add('show');
    }, 1500);
  }
}

function nextHunt() {
  document.getElementById('win-overlay').classList.remove('show');
  const next = (currentHunt.id + 1) % HUNTS.length;
  startHunt(next);
}

// Init
buildLobby();
</script>
</body>
</html>
